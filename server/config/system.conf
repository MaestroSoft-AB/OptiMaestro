
# Optimaestro Server Configuration

# TCP Server Settings

tcp.host=0.0.0.0
tcp.port=8080
tcp.backlog=128 //Maximum number of pending connections waiting to be accepted
// how it is used listen(socket_fd, backlog)

# HTTP Server Settings

http.enabled=true
http.port=8081
http.root=/var/www/html //Root directory for serving static HTTP content
//example of use: open(root + "/index.html"->(requested path));
http.keepalive=true
/* if (keepalive) {
    reuse_connection();
}
*/

# Worker / Thread Pool

worker.enabled=true       //Enable / Disable worker threads
worker.threads=4         //Number of worker threads to spawn
worker.queue_size=256   //Maximum number of tasks in the worker queue
/* 
Example of use:
int threads = atoi(threads_str);
pthread_create(...);
*/
# Feature flags Enable / Disable 
# configurations switches can run at runtime
# changing behaviour without recompiling

feature.cache=true     //disable / enable caching feature
feature.metrics=false //disable / enable metrics collection

# Arrays

upstream.servers=10.0.0.1,10.0.0.2,10.0.0.3 //ip adresses each representing a service instance


# Connection Limits

limits.max_connections=1000
/* Example of use:
if (active_connections >= max_connections) {
    reject_new_connection();
}
*/
limits.max_payload_size=1048576
/* Example of use:
if (payload_size > max_payload_size) {
    close_connection();
}
*/

# Logging

log.level=info
/* Example of use:
if (level >= INFO) log(...);
*/

log.path=logs/optimaestro.log
/* Example of use:
log_fd = open(path,O_APPEND);
*/