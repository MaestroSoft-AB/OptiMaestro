
# Optimaestro Server Configuration

# TCP Server Settings

tcp.host=0.0.0.0
tcp.port=8080
tcp.backlog=128


# HTTP Server Settings

http.enabled=true
http.port=8081
http.root=/var/www/html
http.keepalive=true


# Worker / Thread Pool

worker.enabled=true
worker.threads=4
worker.queue_size=256

# Feature flags Enable / Disable 
# configurations switches can run at runtime
# changing behaviour without recompiling

feature.cache=true  //disable / enable caching feature
feature.metrics=false

# Arrays

upstream.servers=10.0.0.1,10.0.0.2,10.0.0.3 //ip adresses each representing a service instance


# Connection Limits

limits.max_connections=1000
limits.max_payload_size=1048576


# Logging

log.level=info
log.path=logs/optimaestro.log
