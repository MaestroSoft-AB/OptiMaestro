
# Optimaestro Server Configuration

# TCP Server Settings

tcp.host=0.0.0.0
tcp.port=8080
tcp.backlog=128


# HTTP Server Settings

http.enabled=true
http.port=8081
http.root=/var/www/html
http.keepalive=true


# Worker / Thread Pool

worker.enabled=true
worker.threads=4
worker.queue_size=256


# Connection Limits

limits.max_connections=1000
limits.max_payload_size=1048576


# Logging

log.level=info
log.path=logs/optimaestro.log
